name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test deps (light)
        # 单测只覆盖纯逻辑（store / correct / demo / dictionary），
        # 不依赖 PySide6、onnxruntime 等重型运行时，CI 仅安装轻量依赖。
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Compile check
        run: python -m compileall -q main.py store.py backend page_main.py page_game.py page_records.py page_map.py page_gallery.py recorder.py theme.py utils.py worker.py asr

      - name: Run unit tests
        run: python -m unittest discover -s tests -t . -v
